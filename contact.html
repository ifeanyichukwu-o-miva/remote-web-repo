<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
</head>
<body>
    <h1>Contact Us</h1>
    <h3>We'd love to hear from you!</h3>
    <p>Have a question about our collections, orders, sizing, or collaborations? Reach out and our team will get back to you as soon as possible.</p>

    <form action="api/v1/form" method="post">
        <label for="name">Full Name</label>
        <input id="name" type="name"required placeholder="e.g., Timothy">

        <br>
         <label for="email">Email Address</label>
        <input id="email" type="email"required placeholder="name@company.com">

        <br>

         <label for="name">Phone Number</label>
        <input id="name" type="name" placeholder="+234 2690 4729">

        <br>
        
        <label for="subject">Subject</label>
        <select id="subject" name="subject">
            <option value="order inquiry">Order Inquiry</option>
             <option value="report a problem">Report a problem</option>
              <option value="partnership">Partnership</option>
        </select>

        <br>

        <label for="message">Message</label>
        <textarea id="message" type="text" placeholder="Tell us about how we can help you."></textarea required>

            <br>

            <button>Send message</button>




    </form>
</body>
</html>
